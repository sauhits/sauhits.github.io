<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoelaのPortfolio</title>
    <link rel="stylesheet" href="test_styles.css">
</head>

<body>
    <script src="./portfolio_detail.js"></script>
    <header>
        <div>
            <p></p>
        </div>
    </header>
    <main>
        <div class="side">
            <div class="account-menu">
                <img src="./img/oct_icon.jpg" alt="">
                <div class="account-info">
                    <div class="account-name">Coela</div>
                </div>
            </div>
            <div class="menu">
                <ul>
                    <a href="./index.html">
                        <li>
                            <img src="./img/home.svg" alt="">
                            <p>Home</p>
                        </li>
                    </a>
                    <a href="./about.html">
                        <li>
                            <img src="./img/about.svg" alt="">
                            <p>About</p>
                        </li>
                    </a>
                    <li style="background-color: rgb(220, 220, 220);border-left:5px solid rgb(0,137,242)">
                        <img src="./img/portfolio.svg" alt="">
                        <p>Portfolio</p>
                    </li>
                    <a href="./contact.html">
                        <li><img src="./img/contact.svg" alt="">
                            <p>Contact</p>
                        </li>
                    </a>
                </ul>
            </div>
        </div>

        <div class="content-area">
            <div class="area">
                <div class="title">
                    <a href="./portfolio.html" class="title parent">Portfolio</a>
                    <div class="title" style="color: rgb(100, 100, 100); display: inline;">></div>
                    <a class="title insert_title">hoge</a>
                </div>
                <div>
                    <ul>
                        <div class="content">
                            <li>
                                <div class="content-icon-text">
                                    <div class="content-text">
                                        <p class="content-title insert_title">{hoge}</p>
                                        <p class="content-description insert_subtitle">{hoge}</p>
                                    </div>
                                </div>
                            </li>
                        </div>
                        <div class="description-on">
                            <div class="mini-content">
                                <p class="mini-content-title">技術スタック:</p>
                                <p class="mini-content-description insert_tech-stack">{hoge}</p>
                            </div>
                            <div class="mini-content">
                                <p class="mini-content-title">状態:</p>
                                <p class="mini-content-description insert_status">{hoge}</p>
                            </div>
                            <div class="mini-content">
                                <p class="mini-content-title">詳細:</p>
                                <p class="mini-content-description insert_details">{hoge}</p>
                            </div>
                        </div>
                    </ul>
                </div>
                <div class="external">
                    <ul>
                        <li class="external-li insert_github">
                            <img src="./img/GitHub_Invertocat_Black.svg" alt="">
                            <a href="#" target="_blank">
                                <p>GitHubはこちら</p>
                            </a>
                        </li>
                        <li class="external-li insert_qiita">
                            <img src="./img/qiita-icon.svg" alt="">
                            <a href="#" target="_blank">
                                <p>Qiitaはこちら</p>
                            </a>
                        </li>
                        <li class="external-li insert_external">
                            <img src="./img/WEBpage.svg" alt="">
                            <a href="#" target="_blank">
                                <p>外部公開はこちら</p>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

        </div>
    </main>
    <footer>
        <div class="footer-right">
            <p class="footer-right-text">
                &copy; 2026 Coela. All rights reserved.
            </p>
        </div>
    </footer>
</body>

</html>
